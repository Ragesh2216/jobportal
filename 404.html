<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta name="description" content="Page not found." />
    <title>404 Not Found – Stackly</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="error-page">

    <div class="error-content">
        <div class="error-number">404</div>
        <h1 class="error-title">Oops! Page not found</h1>
        <p class="error-sub">Looks like the page you are looking for has been moved, deleted, or doesn't exist.</p>

        <div class="error-actions">
            <a href="index.html"><button class="btn-primary"
                    style="padding:.85rem 2rem;font-size:1rem;border-radius:99px">Go to Homepage</button></a>
            <a href="jobs.html"><button class="btn-outline"
                    style="border-color:rgba(255,255,255,.3);color:#fff;padding:.85rem 2rem;font-size:1rem;border-radius:99px">Browse
                    Jobs</button></a>
        </div>
    </div>

    <!-- Simple stars background -->
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:-1;opacity:.4">
        <div
            style="position:absolute;top:10%;left:20%;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 10px #fff">
        </div>
        <div
            style="position:absolute;top:30%;left:80%;width:4px;height:4px;background:#fff;border-radius:50%;box-shadow:0 0 10px #fff">
        </div>
        <div
            style="position:absolute;top:60%;left:15%;width:2px;height:2px;background:#fff;border-radius:50%;box-shadow:0 0 10px #fff">
        </div>
        <div
            style="position:absolute;top:80%;left:75%;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 10px #fff">
        </div>
        <div
            style="position:absolute;top:45%;left:50%;width:5px;height:5px;background:#fff;border-radius:50%;box-shadow:0 0 15px #fff">
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
