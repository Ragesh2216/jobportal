<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta name="description"
        content="Login or Create an account on Stackly to apply for jobs and track your applications." />
    <title>Login / Sign Up – Stackly</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo">Stack<span>ly</span></div>
        <div class="splash-tagline">Find your dream job today.</div>
        <div class="splash-loader">
            <div class="splash-loader-bar"></div>
        </div>
    </div>
    <!-- Back Navigation -->
    <div style="position:absolute;top:1.5rem;left:1.5rem;z-index:100">
        <a href="index.html"
            style="color:#fff;display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.9rem;background:rgba(255,255,255,.1);padding:.5rem 1rem;border-radius:99px;backdrop-filter:blur(4px)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Back to Home
        </a>
    </div>

    <div class="login-wrapper">
        <div class="auth-card">
            <div style="text-align:center;margin-bottom:2rem">
                <div class="nav-logo" style="justify-content:center;margin-bottom:.5rem;font-size:2rem">
                    Stack<span>ly</span></div>
                <p style="color:var(--gray);font-size:.9rem">Your next big opportunity starts here.</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Log In</button>
                <button class="auth-tab" id="tab-signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form-panel" id="panel-login" style="display:flex;flex-direction:column;gap:1.25rem">
                <form class="auth-form" action="404.html">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required />
                        <div style="text-align:right;margin-top:.25rem"><a href="404.html"
                                style="font-size:.8rem;color:var(--primary);font-weight:600">Forgot Password?</a></div>
                    </div>
                    <button type="submit" class="btn-full" style="margin-top:.5rem">Log In</button>
                </form>

                <div class="form-divider">or continue with</div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
                    <button class="btn-outline"
                        style="background:#fff;color:var(--dark);border-color:var(--border);padding:.75rem;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:.5rem"
                        onclick="window.location.href='404.html'">
                        <span style="font-weight:bold;color:#4285f4;font-size:1.1rem">G</span> Google
                    </button>
                    <button class="btn-outline"
                        style="background:#fff;color:var(--dark);border-color:var(--border);padding:.75rem;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:.5rem"
                        onclick="window.location.href='404.html'">
                        <span style="font-weight:bold;color:#0a66c2;font-size:1.1rem">in</span> LinkedIn
                    </button>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div class="auth-form-panel" id="panel-signup" style="display:none;flex-direction:column;gap:1.25rem">
                <form class="auth-form" action="404.html">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="su-fname">First Name</label>
                            <input type="text" id="su-fname" placeholder="John" required />
                        </div>
                        <div class="form-group">
                            <label for="su-lname">Last Name</label>
                            <input type="text" id="su-lname" placeholder="Doe" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="su-email">Email Address</label>
                        <input type="email" id="su-email" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="su-role">I am a...</label>
                        <select id="su-role" required>
                            <option value="" disabled selected>Select Account Type</option>
                            <option value="candidate">Job Seeker (Looking for a job)</option>
                            <option value="employer">Employer (Hiring talent)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="su-pass">Password</label>
                        <input type="password" id="su-pass" placeholder="Create a password" required />
                        <p style="font-size:.72rem;color:var(--gray);margin-top:.2rem">Must be at least 8 characters
                            long</p>
                    </div>

                    <label
                        style="display:flex;align-items:flex-start;gap:.5rem;font-size:.8rem;color:var(--dark3);margin-top:.5rem;cursor:pointer">
                        <input type="checkbox" required style="margin-top:.2rem" />
                        <span>I agree to the <a href="404.html"
                                style="color:var(--primary);text-decoration:underline">Terms of Service</a> and <a
                                href="404.html" style="color:var(--primary);text-decoration:underline">Privacy
                                Policy</a>.</span>
                    </label>

                    <button type="submit" class="btn-full" style="margin-top:.5rem">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
